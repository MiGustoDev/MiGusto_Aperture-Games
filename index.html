<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú de Juegos - Empanada Arcade</title>
    <link rel="icon" type="image/png" href="assets/LogoMiGusto2025.png">
    <link rel="stylesheet" href="assets/fonts/fonts.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <img src="assets/LogoMiGusto2025.png" alt="Mi Gusto" class="logo">
        <div class="menu-grid">
            <a href="./games/Catch-the-Empanada/index.html" class="game-card">
                <div class="icon">🥟</div>
                <h2>Catch the Empanada</h2>
            </a>
            <a href="./games/Empanada-Crush/index.html" class="game-card">
                <div class="icon">🍬</div>
                <h2>Empanada Crush</h2>
            </a>
            <a href="./games/Empanada-Puzzle/index.html" class="game-card">
                <div class="icon">🧩</div>
                <h2>Empanada Puzzle</h2>
            </a>
            <a href="./games/PacMan-Empanada/index.html" class="game-card">
                <div class="icon">👻</div>
                <h2>PacMan Empanada</h2>
            </a>
            <a href="./games/Bubble-Empanada-Shooter/index.html" class="game-card">
                <div class="icon">🎯</div>
                <h2>Bubble Empanada Shooter</h2>
            </a>
            <a href="./games/MemoryGame/index.html" class="game-card">
                <div class="icon">🧠</div>
                <h2>Memory Game</h2>
            </a>
        </div>
    </div>
    <footer class="main-footer footer-totem">
        Desarrollado por el <span class="underline">Departamento de sistemas</span> de Mi Gusto 🥟
    </footer>
    <footer class="main-footer footer-mobile">
        Desarrollado por el <span class="underline">Departamento de sistemas</span> de Mi Gusto 🥟
    </footer>
    <script>
        // Limpiar Service Workers antiguos para evitar bucles de recarga/intercalado
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (registrations) {
                for (let registration of registrations) {
                    registration.unregister();
                    console.log('SW Unregistered');
                }
            });
        }
    </script>
</body>

</html>
